- id: q-seed-bias-stereotype-001
  version: 1
  status: draft
  locale: fr-FR
  title: Un exemple généré peut renforcer un stéréotype
  axis: bias_fairness
  difficulty: intermediate
  intent: Faire détecter un biais de représentation dans des exemples ou personas générés par IA.
  context:
    role: concepteur formation
    scenario: Une IA génère des exemples de métiers pour une formation. Les rôles techniques sont tous associés à des hommes et les rôles d'assistance à des femmes.
  prompt: Que faire avant d'utiliser ces exemples ?
  interaction:
    type: single_choice
    min_choices: 1
    max_choices: 1
  choices:
    - id: review_and_rebalance
      label: Identifier le stéréotype, rééquilibrer les exemples et faire relire si nécessaire.
      score: 1.0
      feedback: Correct. Les exemples pédagogiques doivent éviter de renforcer des associations stéréotypées.
    - id: keep_because_generated
      label: Les conserver car ils ont été générés automatiquement et ne visent personne.
      score: -1.0
      severity: high
      feedback: Risqué. Un contenu généré peut reproduire ou amplifier des biais même sans intention explicite.
    - id: randomize_names_only
      label: Changer seulement les prénoms sans revoir les rôles.
      score: -0.5
      severity: medium
      feedback: Partiel. Modifier les prénoms ne corrige pas l'association stéréotypée entre rôles et groupes.
  expected_reasoning:
    - Les exemples générés doivent être relus sous l'angle des représentations.
    - La correction doit agir sur la structure du stéréotype, pas seulement les labels.
  risks:
    - risk-bias-stereotype
  sources:
    - id: source-bender-stochastic-parrots-2021
      label: Bender et al. — On the Dangers of Stochastic Parrots
      url: https://doi.org/10.1145/3442188.3445922
      type: documentation
    - id: source-nist-ai-rmf-1-0
      label: NIST AI Risk Management Framework
      url: https://www.nist.gov/itl/ai-risk-management-framework
      type: public_guidance
  review:
    author: draft-agent
    reviewers: []
    last_reviewed_at: null
    confidence: medium
    notes: Draft corpus seed. À relire avec la grille biais avant passage review.
