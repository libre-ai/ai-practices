      "min_choices": 1,
      "max_choices": 1
    },
    "choices": [
      {
        "id": "template_help_not_guarantee",
        "label": "L'utiliser comme aide de cadrage, mais conserver vérification, sources et revue selon le risque.",
        "score": 1.0,
        "feedback": "Correct. Un template structure la demande mais ne garantit ni vérité ni conformité."
      },
      {
        "id": "adopt_as_policy",
        "label": "L'adopter comme règle suffisante pour tous les usages.",
        "score": -1.0,
        "feedback": "Risqué. Un prompt ne remplace pas politique interne, vérification ou revue humaine.",
        "severity": "high"
      },
      {
        "id": "ban_prompts",
        "label": "Interdire tout template de prompt.",
        "score": 0.0,
        "feedback": "Trop fort. Les templates peuvent aider s'ils restent des aides, pas des garanties.",
        "severity": "low"
      }
