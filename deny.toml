[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  # CC0-1.0: public-domain dedication pulled transitively via dioxus-primitives
  # (ADR 0036). Permissive, sovereignty-safe, on the same floor as the lab.
  "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    # Dioxus Components (dioxus-primitives) is not published on crates.io
    # (lab friction F-006); pinned by rev in crates/ui/Cargo.toml. ADR 0036.
    "https://github.com/DioxusLabs/components",
]
