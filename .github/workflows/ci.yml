name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  RUSTFLAGS: "-D warnings"
  # Compile the sqlx query! macros from the committed .sqlx cache (no DB needed
  # at build); the store's #[sqlx::test] tests connect at runtime via DATABASE_URL.
  SQLX_OFFLINE: "true"
  DATABASE_URL: "postgres://postgres:postgres@localhost:5432/rai_ci"

jobs:
  rust:
    name: Rust quality gates
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rai_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format
        run: cargo fmt --all --check
      - name: Reject dynamic JavaScript evaluation
        run: |
          if grep -RIn --include='*.rs' 'document::eval' apps crates; then
            echo '::error::document::eval would require unsafe-eval in the CSP'
            exit 1
          fi
      - name: Check
        run: cargo check --workspace --all-targets
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        # #[sqlx::test] creates ephemeral databases off DATABASE_URL and applies
        # crates/store/migrations automatically.
        run: cargo test --workspace --all-targets
      - name: Governed content gates
        run: |
          cargo run -p rumble-ai-practices-cli -- validate-corpus --content content/questions
          cargo run -p rumble-ai-practices-cli -- validate-activities --activities content/activities
          cargo run -p rumble-ai-practices-cli -- audit-corpus --content content/questions --media content/media --out reports/audit.json
