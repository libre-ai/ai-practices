name: cohort-e2e

# End-to-end for the k-anonymous cohort feature. Builds the single-origin binary
# with Postgres backend, serves it on :3000, and runs the cohort specs against it
# (online distribution + offline degradation).
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  SQLX_OFFLINE: "true"
  DATABASE_URL: "postgres://postgres:postgres@localhost:5432/rai_cohort_e2e"

jobs:
  cohort-e2e:
    name: Cohort e2e (Postgres + binary)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rai_cohort_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install dioxus-cli
        run: cargo install dioxus-cli --version 0.7.9 --locked
      - name: Build web (release PWA)
        run: cd apps/web && dx build --platform web --release
      - name: Build binary (release)
        run: cargo build -p rumble-ai-practices-cli --release
      - name: Install e2e deps
        run: cd apps/web && npm ci
      - name: Install Playwright browser
        run: cd apps/web && npx playwright install --with-deps chromium
      # One run block: a backgrounded process does not survive the end of a step,
      # so start, wait, and test must share the same shell (matches e2e.yml).
      - name: Serve the binary and run the cohort e2e
        run: |
          DATABASE_URL="$DATABASE_URL" \
          ./target/release/rumble-ai-practices serve \
            --bind 127.0.0.1:3000 \
            --web-root target/dx/rumble-ai-practices-web-app/release/web/public &
          npx --yes wait-on http://127.0.0.1:3000/healthz --timeout 60000
          # --workers=1: every test POSTs into the same Postgres; parallel workers
          # accumulate submissions past k=5 and the below-k premise breaks.
          cd apps/web && E2E_BASE_URL=http://127.0.0.1:3000 npx playwright test cohort.spec.ts --workers=1
