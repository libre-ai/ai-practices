name: e2e

# Durable browser e2e for the web PWA (Playwright). Builds the release PWA,
# serves it statically, and runs the parcours specs (chromium + mobile).
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright parcours
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install dioxus-cli
        run: cargo install dioxus-cli --version 0.7.9 --locked
      - name: Build web (release PWA)
        run: cd apps/web && dx build --platform web --release
      - name: Install e2e deps
        run: cd apps/web && npm ci
      - name: Install Playwright browser
        run: cd apps/web && npx playwright install --with-deps chromium
      - name: Serve build + run e2e
        run: |
          npx --yes serve -s target/dx/rumble-ai-practices-web-app/release/web/public -l 8080 &
          npx --yes wait-on http://localhost:8080 --timeout 60000
          cd apps/web && npx playwright test
