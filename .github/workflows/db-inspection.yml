name: db-inspection

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  WDI_VERSION: v0.1.0-alpha.1
  WDI_ARCHIVE: wrench-db-inspect-x86_64-unknown-linux-gnu.tar.gz
  WDI_SHA256: de9bbb21fce77ac61173d42e116d0827ece78eabb19e055f732f0e29a57ab6ae

jobs:
  protected-branch:
    name: Database inspection gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download pinned wrench-db-inspect release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tools/wrench-db-inspect target/db-inspect
          url="https://github.com/constantin-jais/wrench-db-inspect/releases/download/${WDI_VERSION}/${WDI_ARCHIVE}"
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error --location \
            --output "target/db-inspect/${WDI_ARCHIVE}" "$url"
          printf '%s  %s\n' "$WDI_SHA256" "target/db-inspect/${WDI_ARCHIVE}" \
            | sha256sum --check --strict
          tar -xzf "target/db-inspect/${WDI_ARCHIVE}" -C .tools/wrench-db-inspect
          .tools/wrench-db-inspect/wrench-db-inspect --help >/dev/null
      - name: Inspect PostgreSQL migrations (fail closed)
        run: |
          .tools/wrench-db-inspect/wrench-db-inspect run \
            --manifest db-security-manifest.json \
            --schema-dump crates/store/migrations/0001_anonymous_cohort.sql \
            --profile protected_branch \
            --report-json target/db-inspect/report.json \
            --report-md target/db-inspect/report.md
      - name: Upload inspection evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wrench-db-inspect-report
          path: |
            target/db-inspect/report.json
            target/db-inspect/report.md
          if-no-files-found: error
          retention-days: 14
