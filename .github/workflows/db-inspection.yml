name: db-inspection

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DBI_VERSION: v0.1.0-alpha.7
  DBI_ARCHIVE: db-inspect-x86_64-unknown-linux-gnu.tar.gz
  DBI_SHA256: 15e2289baa9e935139e23dcf808e0d612d67336609671b524a4fcc12759ffddb

jobs:
  protected-branch:
    name: Database inspection gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download pinned db-inspect release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tools/db-inspect target/db-inspect
          url="https://github.com/libre-ai/db-inspect/releases/download/${DBI_VERSION}/${DBI_ARCHIVE}"
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error --location \
            --output "target/db-inspect/${DBI_ARCHIVE}" "$url"
          printf '%s  %s\n' "$DBI_SHA256" "target/db-inspect/${DBI_ARCHIVE}" \
            | sha256sum --check --strict
          tar -xzf "target/db-inspect/${DBI_ARCHIVE}" -C .tools/db-inspect
          .tools/db-inspect/db-inspect --help >/dev/null
      - name: Inspect PostgreSQL migrations (fail closed)
        run: |
          .tools/db-inspect/db-inspect run \
            --manifest db-security-manifest.json \
            --schema-dump crates/store/migrations/0001_anonymous_cohort.sql \
            --profile protected_branch \
            --report-json target/db-inspect/report.json \
            --report-md target/db-inspect/report.md
      - name: Upload inspection evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: db-inspect-report
          path: |
            target/db-inspect/report.json
            target/db-inspect/report.md
          if-no-files-found: error
          retention-days: 14
